<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soft Landing — QA Checklist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FAF8F5;
      color: #3D2F2A;
      padding: 32px 16px 64px;
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #3D2F2A;
      margin-bottom: 4px;
    }

    header p {
      font-size: 13px;
      color: #A09080;
    }

    /* Progress bar */
    .progress-wrap {
      background: #EDE8E0;
      border-radius: 8px;
      height: 8px;
      margin: 16px 0 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #C4956A;
      border-radius: 8px;
      transition: width 0.3s ease;
    }
    .progress-label {
      font-size: 12px;
      color: #A09080;
      text-align: right;
    }

    /* Section */
    .section {
      background: #FFFFFF;
      border-radius: 16px;
      border: 1px solid #EDE8E0;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .section-header {
      padding: 14px 18px;
      background: #F5F0E8;
      border-bottom: 1px solid #EDE8E0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .section-header:hover {
      background: #EDE8E0;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #3D2F2A;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .section-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: #A09080;
    }

    .section-count {
      background: #EDE8E0;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      color: #8B7355;
      font-weight: 500;
    }

    .section-count.done {
      background: #D4E8D0;
      color: #4A7A44;
    }

    .collapse-icon {
      font-size: 11px;
      color: #A09080;
      transition: transform 0.2s;
    }

    .section-body {
      padding: 4px 0;
    }

    .section-body.collapsed {
      display: none;
    }

    /* Item */
    .item {
      padding: 10px 18px;
      border-bottom: 1px solid #F5F0E8;
      transition: background 0.15s;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item:hover {
      background: #FDFAF7;
    }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      margin-top: 2px;
      accent-color: #C4956A;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-label {
      font-size: 14px;
      color: #3D2F2A;
      line-height: 1.5;
      flex: 1;
      cursor: pointer;
    }

    .item.checked .item-label {
      color: #A09080;
      text-decoration: line-through;
      text-decoration-color: #C4B59A;
    }

    .note-toggle {
      background: none;
      border: none;
      font-size: 11px;
      color: #C4956A;
      cursor: pointer;
      padding: 0;
      margin-top: 4px;
      text-decoration: underline;
      opacity: 0.7;
    }

    .note-toggle:hover {
      opacity: 1;
    }

    .note-input {
      display: none;
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid #EDE8E0;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: #3D2F2A;
      background: #FDFAF7;
      resize: vertical;
      min-height: 52px;
      line-height: 1.5;
    }

    .note-input:focus {
      outline: none;
      border-color: #C4956A;
    }

    .note-input.visible {
      display: block;
    }

    .note-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: #C4956A;
      margin-left: 6px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    /* Status badge for items */
    .status-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .badge-fail {
      background: #FFE8E4;
      color: #C0392B;
    }

    .badge-skip {
      background: #FFF3CD;
      color: #856404;
    }

    /* Priority tags */
    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 8px;
      margin-right: 6px;
      letter-spacing: 0.3px;
      vertical-align: middle;
    }

    .tag-critical { background: #FFE8E4; color: #C0392B; }
    .tag-security { background: #FFF0E0; color: #C4956A; }
    .tag-backend  { background: #E8F0FF; color: #3A5A8A; }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.8; }

    .btn-primary {
      background: #C4956A;
      color: #FFFFFF;
    }

    .btn-ghost {
      background: #FFFFFF;
      color: #A09080;
      border: 1px solid #EDE8E0;
    }

    .btn-danger {
      background: #FFFFFF;
      color: #C0392B;
      border: 1px solid #F5C6C0;
    }

    /* Footer */
    footer {
      text-align: center;
      font-size: 12px;
      color: #C4B59A;
      margin-top: 32px;
    }
  </style>
</head>

const STORAGE_KEY = 'sl_qa_checklist_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  document.getElementById('lastSaved').textContent = new Date().toLocaleTimeString();
}

let state = loadState();

function getItemState(id) {
  return state[id] || { checked: false, note: '', noteVisible: false };
}

function setItemState(id, patch) {
  state[id] = { ...getItemState(id), ...patch };
  saveState(state);
}

function tagHtml(tag) {
  if (!tag) return '';
  const classes = { critical: 'tag-critical', security: 'tag-security', backend: 'tag-backend' };
  const labels = { critical: 'CRITICAL', security: 'SECURITY', backend: 'BACKEND' };
  return `<span class="tag ${classes[tag]}">${labels[tag]}</span>`;
}

function renderChecklist() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  SECTIONS.forEach(section => {
    const sectionState = state[`__section_${section.id}`] || {};
    const isCollapsed = sectionState.collapsed || false;

    const total = section.items.length;
    const done = section.items.filter(i => getItemState(i.id).checked).length;
    const allDone = done === total;

    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.id = `section-${section.id}`;

    sectionEl.innerHTML = `
      <div class="section-header" onclick="toggleSection('${section.id}')">
        <span class="section-title">${section.title}</span>
        <div class="section-meta">
          <span class="section-count ${allDone ? 'done' : ''}">${done} / ${total}</span>
          <span class="collapse-icon" id="collapse-icon-${section.id}">${isCollapsed ? '▸' : '▾'}</span>
        </div>
      </div>
      <div class="section-body ${isCollapsed ? 'collapsed' : ''}" id="body-${section.id}">
        ${section.items.map(item => renderItem(item)).join('')}
      </div>
    `;

    container.appendChild(sectionEl);
  });

  updateProgress();
}

function renderItem(item) {
  const s = getItemState(item.id);
  const hasNote = s.note && s.note.trim().length > 0;
  return `
    <div class="item ${s.checked ? 'checked' : ''}" id="item-${item.id}">
      <div class="item-row">
        <input type="checkbox" id="cb-${item.id}" ${s.checked ? 'checked' : ''}
          onchange="toggleItem('${item.id}')" />
        <label class="item-label" for="cb-${item.id}">
          ${tagHtml(item.tag)}${item.text}${hasNote ? '<span class="note-indicator"></span>' : ''}
        </label>
      </div>
      <button class="note-toggle" onclick="toggleNote('${item.id}')">
        ${s.noteVisible || hasNote ? (hasNote ? '✎ Edit note' : '✎ Hide note') : '+ Add note'}
      </button>
      <textarea
        class="note-input ${s.noteVisible || hasNote ? 'visible' : ''}"
        id="note-${item.id}"
        placeholder="Describe what happened or what to fix…"
        onblur="saveNote('${item.id}')"
      >${s.note || ''}</textarea>
    </div>
  `;
}

function toggleItem(id) {
  const cb = document.getElementById(`cb-${id}`);
  setItemState(id, { checked: cb.checked });
  const itemEl = document.getElementById(`item-${id}`);
  itemEl.classList.toggle('checked', cb.checked);
  updateSectionCount(id);
  updateProgress();
}

function toggleNote(id) {
  const s = getItemState(id);
  const nowVisible = !(s.noteVisible || (s.note && s.note.trim()));
  setItemState(id, { noteVisible: nowVisible });
  const textarea = document.getElementById(`note-${id}`);
  textarea.classList.toggle('visible', nowVisible);
  const btn = textarea.previousElementSibling;
  btn.textContent = nowVisible ? '✎ Hide note' : '+ Add note';
  if (nowVisible) textarea.focus();
}

function saveNote(id) {
  const textarea = document.getElementById(`note-${id}`);
  const note = textarea.value;
  setItemState(id, { note });
  const hasNote = note && note.trim().length > 0;
  const labelEl = document.querySelector(`#item-${id} .item-label`);
  const existing = labelEl.querySelector('.note-indicator');
  if (hasNote && !existing) {
    const dot = document.createElement('span');
    dot.className = 'note-indicator';
    labelEl.appendChild(dot);
  } else if (!hasNote && existing) {
    existing.remove();
  }
  const btn = textarea.previousElementSibling;
  btn.textContent = hasNote ? '✎ Edit note' : '+ Add note';
}

function toggleSection(id) {
  const body = document.getElementById(`body-${id}`);
  const icon = document.getElementById(`collapse-icon-${id}`);
  const isNowCollapsed = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed', isNowCollapsed);
  icon.textContent = isNowCollapsed ? '▸' : '▾';
  state[`__section_${id}`] = { collapsed: isNowCollapsed };
  saveState(state);
}

function updateSectionCount(itemId) {
  const section = SECTIONS.find(s => s.items.some(i => i.id === itemId));
  if (!section) return;
  const total = section.items.length;
  const done = section.items.filter(i => getItemState(i.id).checked).length;
  const countEl = document.querySelector(`#section-${section.id} .section-count`);
  if (countEl) {
    countEl.textContent = `${done} / ${total}`;
    countEl.classList.toggle('done', done === total);
  }
}

function updateProgress() {
  const allItems = SECTIONS.flatMap(s => s.items);
  const total = allItems.length;
  const done = allItems.filter(i => getItemState(i.id).checked).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressBar').style.width = `${pct}%`;
  document.getElementById('progressLabel').textContent = `${done} / ${total} complete (${pct}%)`;
}

function expandAll() {
  SECTIONS.forEach(s => {
    const body = document.getElementById(`body-${s.id}`);
    const icon = document.getElementById(`collapse-icon-${s.id}`);
    if (body) { body.classList.remove('collapsed'); icon.textContent = '▾'; }
    state[`__section_${s.id}`] = { collapsed: false };
  });
  saveState(state);
}

function collapseAll() {
  SECTIONS.forEach(s => {
    const body = document.getElementById(`body-${s.id}`);
    const icon = document.getElementById(`collapse-icon-${s.id}`);
    if (body) { body.classList.add('collapsed'); icon.textContent = '▸'; }
    state[`__section_${s.id}`] = { collapsed: true };
  });
  saveState(state);
}

function showFailed() {
  SECTIONS.forEach(s => {
    const hasIssues = s.items.some(i => {
      const st = getItemState(i.id);
      return !st.checked && st.note && st.note.trim();
    });
    const body = document.getElementById(`body-${s.id}`);
    const icon = document.getElementById(`collapse-icon-${s.id}`);
    const collapsed = !hasIssues;
    if (body) { body.classList.toggle('collapsed', collapsed); icon.textContent = collapsed ? '▸' : '▾'; }
    state[`__section_${s.id}`] = { collapsed };
  });
  saveState(state);
}

function exportNotes() {
  const lines = ['# Soft Landing QA — Issues Log', `Date: ${new Date().toLocaleDateString()}`, ''];
  let hasAny = false;
  SECTIONS.forEach(s => {
    const issues = s.items.filter(i => {
      const st = getItemState(i.id);
      return st.note && st.note.trim();
    });
    if (issues.length) {
      hasAny = true;
      lines.push(`## ${s.title}`);
      issues.forEach(i => {
        const st = getItemState(i.id);
        lines.push(`- [${st.checked ? 'x' : ' '}] ${i.text}`);
        lines.push(`  > ${st.note.trim()}`);
      });
      lines.push('');
    }
  });
  if (!hasAny) { alert('No notes recorded yet. Add notes to items to build an issues log.'); return; }
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `soft-landing-qa-issues-${new Date().toISOString().slice(0,10)}.md`;
  a.click();
}

function resetAll() {
  if (!confirm('Clear all checkboxes and notes? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = {};
  renderChecklist();
}

renderChecklist();
</script>
</body>
</html>
